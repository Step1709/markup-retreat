<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markup retreat</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="rating-container">
    <div class="rating-card">
      <fieldset class="rate">
        <input type="radio" id="star10" name="rating" value="5" /><label for="star10" title="5 stars"></label>
        <input type="radio" id="star9" name="rating" value="4.5" /><label class="half" for="star9" title="4.5 stars"></label>
        <input type="radio" id="star8" name="rating" value="4" /><label for="star8" title="4 stars"></label>
        <input type="radio" id="star7" name="rating" value="3.5" /><label class="half" for="star7" title="3.5 stars"></label>
        <input type="radio" id="star6" name="rating" value="3" /><label for="star6" title="3 stars"></label>
        <input type="radio" id="star5" name="rating" value="2.5" /><label class="half" for="star5" title="2.5 stars"></label>
        <input type="radio" id="star4" name="rating" value="2" /><label for="star4" title="2 stars"></label>
        <input type="radio" id="star3" name="rating" value="1.5" /><label class="half" for="star3" title="1.5 stars"></label>
        <input type="radio" id="star2" name="rating" value="1" /><label for="star2" title="1 star"></label>
        <input type="radio" id="star1" name="rating" value="0.5" /><label class="half" for="star1" title="0.5 star"></label>
      </fieldset>
    </div>
  </div>
</body>

</html>
